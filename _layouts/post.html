---
layout: default
---
<section class="post">
    <article>
        <h2>{{ page.title }}</h2>
        <ul>
            <li>
                {{ page.date | date: "%Y/%m/%d" }} - {{ page.author }}
            </li>
            <li>categories -
                {% for category in page.categories %}
                    <span>{{ category }}</span>
                {% endfor %}
            </li>
            <li>tags -
                {% for tag in page.tags %}
                    <span>{{ tag }}</span>
                {% endfor %}
            </li>
        </ul>
        
        {{ content }}
</article>
</section>
<a href="{{ site.url }}" class="pretty-button">목록으로</a>
